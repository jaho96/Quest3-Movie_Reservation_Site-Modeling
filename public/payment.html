<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineBook - 결제</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .payment-container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
    .payment-section { background: var(--bg-surface); border-radius: 16px; padding: 28px; margin-bottom: 20px; border: 1px solid var(--border); }
    .payment-section h3 { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: var(--text-primary); }
    .info-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .info-row:last-child { border-bottom: none; }
    .info-label { font-size: 14px; color: var(--text-secondary); }
    .info-value { font-size: 14px; color: var(--text-primary); font-weight: 500; }
    .info-value.highlight { color: var(--accent); font-size: 16px; font-weight: 700; }
    .seat-tags { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
    .seat-tag { background: var(--bg-dark); border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; font-size: 13px; color: var(--text-primary); }
    .payment-methods { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .pay-method { border: 2px solid var(--border); border-radius: 12px; padding: 16px; cursor: pointer; text-align: center; transition: all .2s; background: var(--bg-dark); }
    .pay-method:hover { border-color: var(--accent); }
    .pay-method.selected { border-color: var(--accent); background: rgba(229,160,9,.08); }
    .pay-method .pay-icon { font-size: 28px; margin-bottom: 8px; }
    .pay-method .pay-name { font-size: 13px; color: var(--text-secondary); }
    .terms-check { display: flex; align-items: center; gap: 10px; padding: 14px; background: var(--bg-dark); border-radius: 10px; cursor: pointer; }
    .terms-check input { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent); }
    .terms-check span { font-size: 14px; color: var(--text-secondary); }
    .total-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px 28px; background: var(--bg-surface); border-radius: 16px; border: 1px solid var(--border); margin-bottom: 20px; }
    .total-bar .total-label { font-size: 16px; color: var(--text-secondary); }
    .total-bar .total-price { font-size: 28px; font-weight: 700; color: var(--accent); }
    .btn-pay { width: 100%; padding: 18px; font-size: 18px; font-weight: 700; border-radius: 12px; background: var(--accent); color: #000; border: none; cursor: pointer; transition: opacity .2s; }
    .btn-pay:hover { opacity: .9; }
    .btn-pay:disabled { opacity: .4; cursor: not-allowed; }

    /* Success modal */
    .success-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 1000; align-items: center; justify-content: center; }
    .success-modal.open { display: flex; }
    .success-box { background: var(--bg-surface); border-radius: 20px; padding: 48px 40px; text-align: center; max-width: 420px; width: 90%; border: 1px solid var(--border); }
    .success-icon { font-size: 64px; margin-bottom: 16px; }
    .success-box h2 { font-size: 24px; margin-bottom: 8px; }
    .success-box p { color: var(--text-secondary); margin-bottom: 24px; }
    .reservation-number { background: var(--bg-dark); border-radius: 10px; padding: 14px 20px; margin-bottom: 24px; font-size: 14px; }
    .reservation-number span { display: block; color: var(--text-muted); font-size: 12px; margin-bottom: 4px; }
    .reservation-number strong { font-size: 18px; color: var(--accent); letter-spacing: 1px; }
    .success-actions { display: flex; gap: 10px; }
    .success-actions button { flex: 1; padding: 12px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="logo">🎬 CineBook</a>
    <nav>
      <a href="/">영화</a>
      <a href="/booking.html">예매</a>
    </nav>
    <div class="header-actions" id="headerActions"></div>
  </div>
</header>

<div class="payment-container">
  <div style="margin-bottom:28px;">
    <div style="font-size:13px;color:var(--text-muted);margin-bottom:6px;"><a href="/" style="color:var(--text-muted);">홈</a> › <a href="/booking.html" style="color:var(--text-muted);">예매</a> › 결제</div>
    <h1 style="font-size:26px;font-weight:700;">결제</h1>
  </div>

  <!-- 예매 정보 -->
  <div class="payment-section">
    <h3>예매 정보</h3>
    <div class="info-row">
      <span class="info-label">영화</span>
      <span class="info-value" id="infoMovie">-</span>
    </div>
    <div class="info-row">
      <span class="info-label">극장</span>
      <span class="info-value" id="infoTheater">-</span>
    </div>
    <div class="info-row">
      <span class="info-label">날짜 / 시간</span>
      <span class="info-value" id="infoDatetime">-</span>
    </div>
    <div class="info-row">
      <span class="info-label">좌석</span>
      <div class="seat-tags" id="infoSeats"></div>
    </div>
    <div class="info-row">
      <span class="info-label">관람객 유형</span>
      <span class="info-value" id="infoViewerType">-</span>
    </div>
  </div>

  <!-- 결제 금액 -->
  <div class="payment-section">
    <h3>결제 금액</h3>
    <div class="info-row">
      <span class="info-label">티켓 금액</span>
      <span class="info-value" id="infoPrice">-</span>
    </div>
    <div class="info-row">
      <span class="info-label">좌석 수</span>
      <span class="info-value" id="infoSeatCount">-</span>
    </div>
    <div class="info-row">
      <span class="info-label">합계</span>
      <span class="info-value highlight" id="infoTotal">-</span>
    </div>
  </div>

  <!-- 결제 수단 -->
  <div class="payment-section">
    <h3>결제 수단</h3>
    <div class="payment-methods">
      <div class="pay-method selected" onclick="selectMethod(this,'신용카드')">
        <div class="pay-icon">💳</div>
        <div class="pay-name">신용카드</div>
      </div>
      <div class="pay-method" onclick="selectMethod(this,'체크카드')">
        <div class="pay-icon">💴</div>
        <div class="pay-name">체크카드</div>
      </div>
      <div class="pay-method" onclick="selectMethod(this,'카카오페이')">
        <div class="pay-icon">💛</div>
        <div class="pay-name">카카오페이</div>
      </div>
      <div class="pay-method" onclick="selectMethod(this,'네이버페이')">
        <div class="pay-icon">💚</div>
        <div class="pay-name">네이버페이</div>
      </div>
    </div>
  </div>

  <!-- 약관 동의 -->
  <div class="payment-section">
    <h3>약관 동의</h3>
    <label class="terms-check">
      <input type="checkbox" id="agreeAll" onchange="toggleAgree(this)">
      <span>결제 서비스 이용약관 및 개인정보 제3자 제공에 동의합니다 (필수)</span>
    </label>
  </div>

  <!-- 최종 결제 -->
  <div class="total-bar">
    <span class="total-label">최종 결제금액</span>
    <span class="total-price" id="totalFinal">0원</span>
  </div>
  <button class="btn-pay" id="btnPay" disabled onclick="processPayment()">결제하기</button>
</div>

<!-- 결제 완료 모달 -->
<div class="success-modal" id="successModal">
  <div class="success-box">
    <div class="success-icon">🎉</div>
    <h2>예매가 완료되었습니다!</h2>
    <p>결제가 성공적으로 처리되었습니다.</p>
    <div class="reservation-number">
      <span>예매 번호</span>
      <strong id="reservationNum">-</strong>
    </div>
    <div class="success-actions">
      <button class="btn-outline" onclick="location.href='/mypage.html'">예매 내역 보기</button>
      <button class="btn-primary" onclick="location.href='/'">홈으로</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  let params = {};
  let selectedMethod = '신용카드';
  let reservationId = null;

  function init() {
    const p = new URLSearchParams(location.search);
    params = {
      scheduleId:   p.get('scheduleId'),
      theaterId:    p.get('theaterId'),
      theaterName:  p.get('theaterName'),
      date:         p.get('date'),
      startTime:    p.get('startTime'),
      endTime:      p.get('endTime'),
      seats:        p.get('seats') ? p.get('seats').split(',') : [],
      viewerType:   p.get('viewerType') || '일반',
      price:        parseInt(p.get('price') || 0),
      total:        parseInt(p.get('total') || 0),
      movieTitle:   p.get('movieTitle'),
    };

    if (!params.scheduleId || !params.seats.length) {
      alert('잘못된 접근입니다.');
      location.href = '/booking.html';
      return;
    }

    if (!auth.isLoggedIn()) {
      alert('로그인이 필요합니다.');
      location.href = '/';
      return;
    }

    renderInfo();
  }

  function renderInfo() {
    document.getElementById('infoMovie').textContent = params.movieTitle || '-';
    document.getElementById('infoTheater').textContent = params.theaterName || '-';
    document.getElementById('infoDatetime').textContent = `${params.date} ${params.startTime} ~ ${params.endTime}`;
    document.getElementById('infoSeats').innerHTML = params.seats.map(s => `<span class="seat-tag">${s}</span>`).join('');
    document.getElementById('infoViewerType').textContent = params.viewerType;
    document.getElementById('infoPrice').textContent = `${params.price.toLocaleString()}원`;
    document.getElementById('infoSeatCount').textContent = `${params.seats.length}석`;
    document.getElementById('infoTotal').textContent = `${params.total.toLocaleString()}원`;
    document.getElementById('totalFinal').textContent = `${params.total.toLocaleString()}원`;
  }

  function selectMethod(el, method) {
    document.querySelectorAll('.pay-method').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
    selectedMethod = method;
  }

  function toggleAgree(cb) {
    document.getElementById('btnPay').disabled = !cb.checked;
  }

  async function processPayment() {
    const btn = document.getElementById('btnPay');
    btn.disabled = true;
    btn.textContent = '처리 중...';

    try {
      // 1. 예약 생성
      const resData = await api.reservations.create({
        schedule_id:  parseInt(params.scheduleId),
        viewer_type:  params.viewerType,
        seat_numbers: params.seats,
        price:        params.total,
      });
      reservationId = resData.reservation_id;

      // 2. 결제 생성
      await api.payments.create({
        reservation_id:  reservationId,
        payment_method:  selectedMethod,
        amount:          params.total,
      });

      // 성공 모달
      const user = auth.getUser();
      document.getElementById('reservationNum').textContent = `R${String(reservationId).padStart(6, '0')}`;
      document.getElementById('successModal').classList.add('open');

    } catch (e) {
      showToast(e.message, 'error');
      btn.disabled = false;
      btn.textContent = '결제하기';
    }
  }

  init();
</script>
</body>
</html>
