<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마이페이지 - CineBook</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo">🎬 CineBook</a>
    <nav>
      <a href="index.html">영화</a>
      <a href="booking.html">예매</a>
    </nav>
    <div class="header-actions">
      <span style="font-size:14px; color:var(--text-secondary);">안녕하세요, <strong style="color:var(--text-primary);">김민준</strong>님</span>
      <button class="btn-outline" onclick="location.href='index.html'">로그아웃</button>
    </div>
  </div>
</header>

<div class="section">
  <div class="mypage-layout">

    <!-- LEFT: Profile -->
    <div>
      <div class="profile-card">
        <div class="avatar">👤</div>
        <div class="profile-name">김민준</div>
        <div class="profile-email">minjun@email.com</div>
        <div style="font-size:13px; color:var(--text-secondary); margin-bottom:20px;">
          보유 포인트: <strong style="color:var(--accent);">5,000P</strong>
        </div>
        <div class="profile-nav">
          <button class="profile-nav-btn active" onclick="showSection('reservations', this)">🎟 예매 내역</button>
          <button class="profile-nav-btn" onclick="showSection('tickets', this)">🎫 내 티켓</button>
          <button class="profile-nav-btn" onclick="showSection('reviews', this)">💬 내 관람평</button>
          <button class="profile-nav-btn" onclick="showSection('profile', this)">⚙ 회원정보</button>
        </div>
      </div>
    </div>

    <!-- RIGHT: Content -->
    <div>

      <!-- 예매 내역 -->
      <div id="section-reservations">
        <div class="section-title">예매 내역</div>

        <!-- 현재 예약 -->
        <div style="margin-bottom:12px;">
          <span class="badge badge-accent" style="font-size:12px; padding:4px 10px;">예정된 예매</span>
        </div>

        <div class="reservation-card">
          <div class="res-poster">
            <img src="https://via.placeholder.com/60x86/1a1a2e/e94560?text=베테"
              onerror="this.outerHTML='<div style=&quot;width:60px;height:86px;background:var(--bg-surface);display:flex;align-items:center;justify-content:center;font-size:24px;&quot;>🎬</div>'">
          </div>
          <div>
            <div class="res-title">베테랑 2</div>
            <div class="res-detail">
              CGV 강남 · 1관<br>
              2026년 5월 10일 (일) 14:30<br>
              G7, G8 · 성인 2명<br>
              예매번호: CGV20260510001
            </div>
          </div>
          <div class="res-status">
            <span class="status-badge status-upcoming">관람 예정</span>
            <div style="margin-top:12px;">
              <button class="btn-outline" style="font-size:12px; padding:6px 12px;" onclick="cancelReservation()">예매 취소</button>
            </div>
          </div>
        </div>

        <div style="margin:24px 0 12px;">
          <span class="badge badge-outline" style="font-size:12px; padding:4px 10px;">지난 예매</span>
        </div>

        <!-- 지난 예매들 -->
        <div id="pastReservations"></div>
      </div>

      <!-- 내 티켓 -->
      <div id="section-tickets" style="display:none;">
        <div class="section-title">내 티켓</div>
        <div id="ticketList"></div>
      </div>

      <!-- 내 관람평 -->
      <div id="section-reviews" style="display:none;">
        <div class="section-title">내 관람평</div>
        <div id="myReviewList"></div>
      </div>

      <!-- 회원정보 -->
      <div id="section-profile" style="display:none;">
        <div class="section-title">회원정보</div>
        <div class="booking-panel">
          <div class="form-group">
            <label class="form-label">이름</label>
            <input type="text" class="form-input" value="김민준">
          </div>
          <div class="form-group">
            <label class="form-label">이메일</label>
            <input type="email" class="form-input" value="minjun@email.com">
          </div>
          <div class="form-group">
            <label class="form-label">생년월일</label>
            <input type="text" class="form-input" value="1995-03-15">
          </div>
          <div class="form-group">
            <label class="form-label">휴대폰</label>
            <input type="tel" class="form-input" value="010-1234-5678">
          </div>
          <div class="form-group">
            <label class="form-label">현재 비밀번호</label>
            <input type="password" class="form-input" placeholder="현재 비밀번호">
          </div>
          <div class="form-group">
            <label class="form-label">새 비밀번호</label>
            <input type="password" class="form-input" placeholder="새 비밀번호 (변경 시에만 입력)">
          </div>
          <button class="btn-primary" style="padding:12px 24px;" onclick="showToast('회원정보가 수정되었습니다.', 'success')">정보 수정</button>
          <button class="btn-outline" style="padding:12px 24px; margin-left:10px; color:var(--accent); border-color:var(--accent);" onclick="confirmWithdraw()">회원 탈퇴</button>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- 취소 확인 모달 -->
<div class="modal-overlay" id="cancelModal">
  <div class="modal" style="position:relative;">
    <span class="modal-close" onclick="closeModal('cancelModal')">✕</span>
    <h2>예매를 취소하시겠습니까?</h2>
    <p>취소 수수료가 발생할 수 있습니다.<br>취소된 예매는 복구할 수 없습니다.</p>
    <div class="modal-actions">
      <button class="btn-primary" style="padding:13px; background:var(--accent);" onclick="doCancelReservation()">예매 취소하기</button>
      <button class="btn-outline" style="padding:12px;" onclick="closeModal('cancelModal')">돌아가기</button>
    </div>
  </div>
</div>

<footer>
  <div class="footer-logo">🎬 CineBook</div>
  <p>© 2026 CineBook. All rights reserved.</p>
</footer>

<script src="js/data.js"></script>
<script>
  function showSection(name, btn) {
    ['reservations','tickets','reviews','profile'].forEach(s => {
      document.getElementById('section-'+s).style.display = s === name ? 'block' : 'none';
    });
    document.querySelectorAll('.profile-nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function renderPastReservations() {
    const pastMovies = [
      { title: '파묘', date: '2024-03-01', theater: 'CGV 강남', seats: 'D4, D5', type: '성인', amount: 28000, status: '관람완료' },
      { title: '듄: 파트 2', date: '2024-03-10', theater: 'CGV 홍대', seats: 'F6', type: '성인', amount: 19000, status: '관람완료' },
      { title: '인사이드 아웃 2', date: '2024-06-15', theater: 'CGV 강남', seats: 'E3, E4, E5', type: '성인', amount: 42000, status: '관람완료' }
    ];

    document.getElementById('pastReservations').innerHTML = pastMovies.map((r,i) => `
      <div class="reservation-card">
        <div class="res-poster">
          <div style="width:60px;height:86px;background:var(--bg-surface);display:flex;align-items:center;justify-content:center;font-size:24px;">🎬</div>
        </div>
        <div>
          <div class="res-title">${r.title}</div>
          <div class="res-detail">
            ${r.theater}<br>
            ${r.date}<br>
            ${r.seats} · ${r.type}<br>
            결제금액: ${r.amount.toLocaleString()}원
          </div>
        </div>
        <div class="res-status">
          <span class="status-badge status-done">${r.status}</span>
          <div style="margin-top:12px;">
            <button class="btn-outline" style="font-size:12px; padding:6px 12px;" onclick="location.href='detail.html?id=${i+2}'">리뷰 작성</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function renderTickets() {
    const tickets = [
      { movie: '파묘', date: '2024-03-01', time: '14:30', theater: 'CGV 강남', screen: '2관', seat: 'D4', type: '성인', amount: 14000 },
      { movie: '파묘', date: '2024-03-01', time: '14:30', theater: 'CGV 강남', screen: '2관', seat: 'D5', type: '성인', amount: 14000 },
      { movie: '인사이드 아웃 2', date: '2024-06-15', time: '11:00', theater: 'CGV 강남', screen: '3관(IMAX)', seat: 'E3', type: '성인', amount: 19000 }
    ];

    document.getElementById('ticketList').innerHTML = tickets.map(t => `
      <div style="background:var(--bg-card); border:1px solid var(--border); border-radius:12px; margin-bottom:16px; overflow:hidden;">
        <div style="background:var(--accent); padding:12px 20px; display:flex; justify-content:space-between; align-items:center;">
          <strong style="font-size:16px;">${t.movie}</strong>
          <span style="font-size:12px; opacity:0.8;">사용완료</span>
        </div>
        <div style="padding:20px; display:grid; grid-template-columns:1fr 1fr; gap:10px;">
          <div class="summary-row"><span class="label">날짜</span><span class="value">${t.date}</span></div>
          <div class="summary-row"><span class="label">시간</span><span class="value">${t.time}</span></div>
          <div class="summary-row"><span class="label">극장</span><span class="value">${t.theater}</span></div>
          <div class="summary-row"><span class="label">상영관</span><span class="value">${t.screen}</span></div>
          <div class="summary-row"><span class="label">좌석</span><span class="value" style="color:var(--accent); font-weight:700;">${t.seat}</span></div>
          <div class="summary-row"><span class="label">금액</span><span class="value">${t.amount.toLocaleString()}원</span></div>
        </div>
      </div>
    `).join('');
  }

  function renderMyReviews() {
    const myReviews = DB.reviews.filter(r => r.customerId === 1);
    if (!myReviews.length) {
      document.getElementById('myReviewList').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">💬</div>
          <p>작성한 관람평이 없습니다.</p>
        </div>`;
      return;
    }
    document.getElementById('myReviewList').innerHTML = myReviews.map(r => {
      const movie = DB.movies.find(m => m.id === r.movieId);
      return `
        <div class="review-card">
          <div class="review-header">
            <div>
              <div class="reviewer" style="color:var(--accent);">${movie?.title || '알 수 없음'}</div>
              <div class="review-date">${r.createdAt}</div>
            </div>
            <div style="text-align:right;">
              <div class="review-rating">${r.rating}<span style="font-size:14px; color:var(--text-muted);">/10</span></div>
              <button style="font-size:11px; color:var(--text-muted); background:none; cursor:pointer; margin-top:4px;" onclick="deleteReview(${r.id}, this.closest('.review-card'))">삭제</button>
            </div>
          </div>
          <div class="review-points">
            ${r.viewingPoints.map(p => `<span class="point-tag">${p}</span>`).join('')}
          </div>
          <div class="review-content">${r.content}</div>
          <div class="review-likes">👍 ${r.likes}명에게 도움이 됐어요</div>
        </div>
      `;
    }).join('');
  }

  function cancelReservation() {
    document.getElementById('cancelModal').classList.add('open');
  }

  function doCancelReservation() {
    closeModal('cancelModal');
    showToast('예매가 취소되었습니다.', 'success');
    document.querySelector('.reservation-card').style.opacity = '0.4';
    document.querySelector('.status-badge.status-upcoming').textContent = '취소됨';
    document.querySelector('.status-badge.status-upcoming').classList.replace('status-upcoming', 'status-canceled');
  }

  function deleteReview(id, el) {
    if (!confirm('관람평을 삭제하시겠습니까?')) return;
    const idx = DB.reviews.findIndex(r => r.id === id);
    if (idx >= 0) DB.reviews.splice(idx, 1);
    el.remove();
    showToast('관람평이 삭제되었습니다.');
  }

  function confirmWithdraw() {
    if (confirm('정말 탈퇴하시겠습니까? 모든 데이터가 삭제됩니다.')) {
      showToast('탈퇴 처리되었습니다.', 'success');
      setTimeout(() => location.href = 'index.html', 1500);
    }
  }

  function openModal(id) { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  function showToast(msg, type = '') {
    const t = document.createElement('div');
    t.className = 'toast' + (type ? ' ' + type : '');
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  document.querySelectorAll('.modal-overlay').forEach(el => {
    el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
  });

  renderPastReservations();
  renderTickets();
  renderMyReviews();
</script>
</body>
</html>
